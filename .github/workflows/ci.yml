name: CI

# Static analysis for every script in the repo, so a typo, a shellcheck regression, or a
# docker-compose file that mounts the archive WRITABLE is caught here — never on the family's box.
# Mirrors `./ci/run.sh`, which you can (and should) run locally before pushing.

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref cancels an in-flight run for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: shellcheck · compose · rsync backup drill
    # Pinned (not ubuntu-latest): this image's apt shellcheck is 0.9.0, the version the clean
    # baseline was validated against, so CI findings match what a developer sees locally.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tools (shellcheck, PyYAML, rsync)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck python3-yaml rsync

      - name: Run static checks + rsync backup drill
        # ci/run.sh also calls the restic and search drills, which self-skip here (they have their
        # own jobs below, with the heavier tools installed).
        run: bash ci/run.sh

  restic:
    name: backup/restore drill (restic)
    # Proves the encrypted backup actually restores — runs the real archive-restic wrapper against a
    # scratch repo (backup, restore, point-in-time, corruption detection). No Docker needed.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install restic
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends restic

      - name: Backup/restore drill
        run: bash ci/restic-roundtrip.sh

  search:
    name: search + OCR drill (find the scanned will)
    # Proves the acceptance test — the family can FIND a SCANNED will — by driving the real
    # archive-index / archive-search / archive-find commands over a seeded scratch archive and the
    # committed image-only PDF fixture, asserting recoll's OCR makes it searchable by content.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install recoll + tesseract + poppler
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends recollcmd plocate tesseract-ocr tesseract-ocr-eng poppler-utils

      - name: Search/OCR drill
        run: bash ci/search-roundtrip.sh
